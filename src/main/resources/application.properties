spring.application.name=spring-ai

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.organization-id=${OPENAI_ORG_ID}
spring.ai.openai.project-id=${OPENAI_PROJECT_ID}
# spring.ai.openai.chat.options.model=gpt-4.1-mini
spring.ai.openai.chat.options.model=gpt-4.1

spring.datasource.password=secret
spring.datasource.url=dbc:postgresql://localhost:5432/springAILearn
spring.datasource.username=myuser

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

spring.jpa.show-sql=true